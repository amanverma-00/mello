services:
  # API Server
  - type: web
    name: melo-server
    runtime: docker
    dockerfilePath: apps/server/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: melo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: melo-redis
          type: redis
          property: connectionString
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: APP_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: JWT_PRIVATE_KEY_PATH
        value: /app/apps/server/keys/private.pem
      - key: JWT_PUBLIC_KEY_PATH
        value: /app/apps/server/keys/public.pem
    healthCheckPath: /api/v1/health
    plan: starter

  # Web Frontend (static site)
  - type: web
    name: melo-web
    runtime: static
    buildCommand: pnpm install && pnpm build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "22"

databases:
  - name: melo-db
    plan: starter
    databaseName: melo
    user: melo

# Note: Redis must be created separately on Render or use Upstash.
# Set REDIS_URL in the environment manually after provisioning.
